packages:
  - apps/*
  - infra/*
  - oxlint-plugin-t3code
  - packages/*
  - scripts

catalog:
  "@clerk/backend": 3.8.3-snapshot.v20260622234151
  "@clerk/clerk-js": 6.21.0-snapshot.v20260622234151
  "@clerk/electron": 0.0.2-snapshot.v20260622234151
  "@clerk/electron-passkeys": 0.0.2-snapshot.v20260622234151
  "@clerk/expo": 3.5.3-snapshot.v20260622234151
  "@clerk/react": 6.11.0-snapshot.v20260622234151
  "@clerk/shared": 4.21.0-snapshot.v20260622234151
  "@effect/atom-react": 4.0.0-beta.78
  "@effect/openapi-generator": 4.0.0-beta.78
  "@effect/platform-bun": 4.0.0-beta.78
  "@effect/platform-node": 4.0.0-beta.78
  "@effect/platform-node-shared": 4.0.0-beta.78
  "@effect/sql-pg": 4.0.0-beta.78
  "@effect/sql-sqlite-bun": 4.0.0-beta.78
  "@effect/tsgo": 0.13.2
  "@effect/vitest": 4.0.0-beta.78
  "@noble/curves": 1.9.1
  "@noble/hashes": 1.8.0
  "@pierre/diffs": 1.3.0-beta.5
  "@types/node": 24.12.4
  "@typescript/native-preview": 7.0.0-dev.20260604.1
  effect: 4.0.0-beta.78
  jose: 6.2.2
  typescript: ~6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plus: 0.2.1
  yaml: ^2.9.0

ignoredBuiltDependencies:
  - msw

onlyBuiltDependencies:
  - electron
  - esbuild
  - msgpackr-extract
  - node-pty
  - sharp

overrides:
  # Keep every Clerk consumer on the same snapshot train. Clerk publishes wallet
  # auth integrations as required dependencies, but T3 Code does not support
  # wallet auth, so keep that unused dependency tree out of installs.
  "@clerk/backend": "catalog:"
  "@clerk/clerk-js": "catalog:"
  "@clerk/electron": "catalog:"
  "@clerk/electron-passkeys": "catalog:"
  "@clerk/expo": "catalog:"
  "@clerk/react": "catalog:"
  "@clerk/shared": "catalog:"
  "@clerk/clerk-js>@base-org/account": "-"
  "@clerk/clerk-js>@coinbase/wallet-sdk": "-"
  "@clerk/clerk-js>@solana/wallet-adapter-base": "-"
  "@clerk/clerk-js>@solana/wallet-adapter-react": "-"
  "@clerk/clerk-js>@solana/wallet-standard": "-"
  "@clerk/clerk-js>@wallet-standard/core": "-"
  "@effect/atom-react": "catalog:"
  "@effect/platform-bun": "catalog:"
  "@effect/platform-node": "catalog:"
  "@effect/platform-node-shared": "catalog:"
  "@effect/sql-pg": "catalog:"
  "@effect/sql-sqlite-bun": "catalog:"
  "@effect/vitest": "catalog:"
  # @effect/vitest is patched to use vite-plus/test; do not auto-install its
  # upstream Vitest peer and create a second Vite/Vitest toolchain.
  "@effect/vitest>vitest": "-"
  "@expo/metro-config": 56.0.13
  "@pierre/diffs>@shikijs/transformers": ^4.2.0
  "@types/node": "catalog:"
  effect: "catalog:"
  vite: "catalog:"
  yaml: "catalog:"

packageExtensions:
  "@effect/vitest@*":
    dependencies:
      vite-plus: "catalog:"
    peerDependenciesMeta:
      vitest:
        optional: true
  vite-plus@*:
    dependencies:
      vite: "catalog:"

patchedDependencies:
  "@effect/vitest@4.0.0-beta.78": patches/@effect__vitest@4.0.0-beta.78.patch
  "@expo/metro-config@56.0.13": patches/@expo%2Fmetro-config@56.0.13.patch
  "@ff-labs/fff-node@0.9.4": patches/@ff-labs__fff-node@0.9.4.patch
  "@pierre/diffs@1.3.0-beta.5": patches/@pierre%2Fdiffs@1.3.0-beta.5.patch
  effect@4.0.0-beta.78: patches/effect@4.0.0-beta.78.patch
  react-native-nitro-modules@0.35.9: patches/react-native-nitro-modules@0.35.9.patch

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
