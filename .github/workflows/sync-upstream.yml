name: Sync upstream main

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream/main into fork main
    if: github.repository != 'pingdotgg/t3code'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/pingdotgg/t3code.git
          git fetch --prune upstream main

      - name: Merge upstream main
        run: git merge --no-edit upstream/main

      - name: Push fork main
        run: git push origin HEAD:main
